<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Auth Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #475569;
    --node-bg: #13131f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: auto;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 10;
    padding: 40px 48px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .header-badge {
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header h1 span { color: var(--accent); }

  .tabs {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 0;
    padding: 24px 48px 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 10px 24px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    color: var(--muted);
    text-transform: uppercase;
    border-radius: 6px 6px 0 0;
    transition: all 0.2s;
    position: relative;
    bottom: -1px;
  }

  .tab.active {
    background: var(--surface);
    color: var(--accent);
    border-color: var(--border);
    border-bottom-color: var(--surface);
  }

  .tab:not(.active):hover { color: var(--text); }

  .canvas {
    position: relative;
    z-index: 10;
    padding: 48px;
    display: none;
  }

  .canvas.active { display: block; }

  /* SVG diagram wrapper */
  .diagram-wrap {
    overflow-x: auto;
    overflow-y: visible;
  }

  svg.flow {
    display: block;
    min-width: 900px;
  }

  /* Node styles */
  .node-start { fill: var(--accent); }
  .node-end-ok { fill: var(--accent3); }
  .node-end-fail { fill: var(--danger); }
  .node-process { fill: var(--node-bg); stroke: var(--border); stroke-width: 1.5; }
  .node-decision { fill: var(--node-bg); stroke: var(--warn); stroke-width: 1.5; }
  .node-action { fill: var(--node-bg); stroke: var(--accent); stroke-width: 1.5; }
  .node-api { fill: var(--node-bg); stroke: var(--accent2); stroke-width: 1.5; }
  .node-storage { fill: var(--node-bg); stroke: var(--accent3); stroke-width: 1.5; }

  .node-text-light { fill: #0a0a0f; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; }
  .node-text { fill: var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 10.5px; }
  .node-label { fill: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.1em; }

  .edge { stroke: var(--muted); stroke-width: 1.5; fill: none; }
  .edge-yes { stroke: var(--accent3); stroke-width: 1.5; fill: none; }
  .edge-no { stroke: var(--danger); stroke-width: 1.5; fill: none; }
  .edge-warn { stroke: var(--warn); stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; fill: none; }

  .edge-label { fill: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 9.5px; }
  .edge-label-yes { fill: var(--accent3); font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600; }
  .edge-label-no { fill: var(--danger); font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 32px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    border: 1.5px solid;
    flex-shrink: 0;
  }

  /* Glow on SVG shapes */
  .glow-cyan { filter: drop-shadow(0 0 6px rgba(0,229,255,0.5)); }
  .glow-green { filter: drop-shadow(0 0 6px rgba(16,185,129,0.5)); }
  .glow-red { filter: drop-shadow(0 0 6px rgba(239,68,68,0.5)); }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Auth System</div>
  <h1>Phone <span>Authentication</span> Flow</h1>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('login')">Login Flow</button>
  <button class="tab" onclick="switchTab('register')">Register Flow</button>
  <button class="tab" onclick="switchTab('otp')">OTP Engine</button>
</div>

<!-- ═══════════════ LOGIN FLOW ═══════════════ -->
<div class="canvas active" id="tab-login">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="border-color:#00e5ff;background:rgba(0,229,255,0.15)"></div>Action / Input</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#f59e0b;background:rgba(245,158,11,0.1)"></div>Decision</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#7c3aed;background:rgba(124,58,237,0.1)"></div>API / Service</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#10b981;background:rgba(16,185,129,0.1)"></div>Storage</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#ef4444;background:rgba(239,68,68,0.1)"></div>Error / Fail</div>
  </div>
  <div class="diagram-wrap">
    <svg class="flow" viewBox="0 0 960 1040" height="1040">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
        </marker>
        <marker id="arr-yes" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
        </marker>
        <marker id="arr-no" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
        </marker>
        <marker id="arr-warn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
        </marker>
      </defs>

      <!-- START -->
      <ellipse cx="480" cy="40" rx="80" ry="24" class="node-start glow-cyan"/>
      <text x="480" y="44" text-anchor="middle" class="node-text-light">START LOGIN</text>

      <!-- 1: Enter Phone -->
      <line x1="480" y1="64" x2="480" y2="96" class="edge" marker-end="url(#arr)"/>
      <rect x="340" y="96" width="280" height="48" rx="6" class="node-action"/>
      <text x="480" y="114" text-anchor="middle" class="node-text">Enter Phone Number</text>
      <text x="480" y="130" text-anchor="middle" class="node-label">E.164 FORMAT  •  +COUNTRY-CODE</text>

      <!-- 2: Validate format -->
      <line x1="480" y1="144" x2="480" y2="176" class="edge" marker-end="url(#arr)"/>
      <polygon points="480,176 620,212 480,248 340,212" class="node-decision"/>
      <text x="480" y="208" text-anchor="middle" class="node-text">Valid Format?</text>
      <text x="480" y="224" text-anchor="middle" class="node-label">REGEX + LENGTH CHECK</text>

      <!-- No → show error (right) -->
      <line x1="620" y1="212" x2="740" y2="212" class="edge-no" marker-end="url(#arr-no)"/>
      <text x="671" y="206" text-anchor="middle" class="edge-label-no">NO</text>
      <rect x="740" y="190" width="160" height="44" rx="6" style="fill:#13131f;stroke:#ef4444;stroke-width:1.5"/>
      <text x="820" y="207" text-anchor="middle" class="node-text">Show Format</text>
      <text x="820" y="221" text-anchor="middle" class="node-text">Error</text>
      <!-- loop back -->
      <path d="M900,212 Q940,212 940,160 Q940,96 620,96" class="edge-no" fill="none" marker-end="url(#arr-no)"/>

      <!-- Yes → Check user exists -->
      <line x1="480" y1="248" x2="480" y2="280" class="edge-yes" marker-end="url(#arr-yes)"/>
      <text x="490" y="268" class="edge-label-yes">YES</text>
      <rect x="320" y="280" width="320" height="48" rx="6" class="node-api"/>
      <text x="480" y="298" text-anchor="middle" class="node-text">Query User DB</text>
      <text x="480" y="314" text-anchor="middle" class="node-label">CHECK PHONE EXISTS  •  API CALL</text>

      <!-- 3: User exists? -->
      <line x1="480" y1="328" x2="480" y2="360" class="edge" marker-end="url(#arr)"/>
      <polygon points="480,360 620,396 480,432 340,396" class="node-decision"/>
      <text x="480" y="392" text-anchor="middle" class="node-text">User Found?</text>
      <text x="480" y="408" text-anchor="middle" class="node-label">DB LOOKUP RESULT</text>

      <!-- No → redirect register -->
      <line x1="340" y1="396" x2="200" y2="396" class="edge-no" marker-end="url(#arr-no)"/>
      <text x="263" y="390" text-anchor="middle" class="edge-label-no">NO</text>
      <rect x="60" y="374" width="140" height="44" rx="6" style="fill:#13131f;stroke:#ef4444;stroke-width:1.5"/>
      <text x="130" y="392" text-anchor="middle" class="node-text">Redirect to</text>
      <text x="130" y="406" text-anchor="middle" class="node-text">Registration</text>

      <!-- Yes → Send OTP -->
      <line x1="480" y1="432" x2="480" y2="464" class="edge-yes" marker-end="url(#arr-yes)"/>
      <text x="490" y="452" class="edge-label-yes">YES</text>
      <rect x="320" y="464" width="320" height="48" rx="6" class="node-api"/>
      <text x="480" y="482" text-anchor="middle" class="node-text">Send OTP via SMS</text>
      <text x="480" y="498" text-anchor="middle" class="node-label">TWILIO / FIREBASE / SNS</text>

      <!-- Rate limit check -->
      <line x1="480" y1="512" x2="480" y2="544" class="edge" marker-end="url(#arr)"/>
      <polygon points="480,544 620,580 480,616 340,580" class="node-decision"/>
      <text x="480" y="576" text-anchor="middle" class="node-text">Rate Limited?</text>
      <text x="480" y="592" text-anchor="middle" class="node-label">MAX 5 ATTEMPTS / 10 MIN</text>

      <!-- Yes rate limited -->
      <line x1="620" y1="580" x2="740" y2="580" class="edge-warn" marker-end="url(#arr-warn)"/>
      <text x="671" y="574" text-anchor="middle" style="fill:#f59e0b;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600">YES</text>
      <rect x="740" y="558" width="160" height="44" rx="6" style="fill:#13131f;stroke:#f59e0b;stroke-width:1.5"/>
      <text x="820" y="575" text-anchor="middle" class="node-text">Block + Show</text>
      <text x="820" y="589" text-anchor="middle" class="node-text">Cooldown Timer</text>

      <!-- No → Enter OTP -->
      <line x1="480" y1="616" x2="480" y2="648" class="edge-yes" marker-end="url(#arr-yes)"/>
      <text x="490" y="636" class="edge-label-yes">NO</text>
      <rect x="340" y="648" width="280" height="48" rx="6" class="node-action"/>
      <text x="480" y="666" text-anchor="middle" class="node-text">User Enters OTP</text>
      <text x="480" y="682" text-anchor="middle" class="node-label">6-DIGIT CODE  •  3 MIN EXPIRY</text>

      <!-- Verify OTP -->
      <line x1="480" y1="696" x2="480" y2="728" class="edge" marker-end="url(#arr)"/>
      <polygon points="480,728 620,764 480,800 340,764" class="node-decision"/>
      <text x="480" y="760" text-anchor="middle" class="node-text">OTP Valid?</text>
      <text x="480" y="776" text-anchor="middle" class="node-label">VERIFY + CHECK EXPIRY</text>

      <!-- OTP invalid -->
      <line x1="340" y1="764" x2="200" y2="764" class="edge-no" marker-end="url(#arr-no)"/>
      <text x="263" y="758" text-anchor="middle" class="edge-label-no">NO</text>
      <rect x="60" y="742" width="140" height="44" rx="6" style="fill:#13131f;stroke:#ef4444;stroke-width:1.5"/>
      <text x="130" y="760" text-anchor="middle" class="node-text">Increment</text>
      <text x="130" y="774" text-anchor="middle" class="node-text">Attempt Count</text>
      <path d="M60,764 Q30,764 30,696 Q30,648 340,648" class="edge-no" fill="none" marker-end="url(#arr-no)"/>

      <!-- OTP valid → Create session -->
      <line x1="480" y1="800" x2="480" y2="832" class="edge-yes" marker-end="url(#arr-yes)"/>
      <text x="490" y="820" class="edge-label-yes">YES</text>
      <rect x="320" y="832" width="320" height="48" rx="6" class="node-storage"/>
      <text x="480" y="850" text-anchor="middle" class="node-text">Create Auth Session</text>
      <text x="480" y="866" text-anchor="middle" class="node-label">JWT / REFRESH TOKEN  •  STORE IN DB</text>

      <!-- Success -->
      <line x1="480" y1="880" x2="480" y2="912" class="edge-yes" marker-end="url(#arr-yes)"/>
      <ellipse cx="480" cy="936" rx="100" ry="24" style="fill:#10b981" class="glow-green"/>
      <text x="480" y="940" text-anchor="middle" class="node-text-light">AUTHENTICATED ✓</text>
    </svg>
  </div>
</div>

<!-- ═══════════════ REGISTER FLOW ═══════════════ -->
<div class="canvas" id="tab-register">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="border-color:#00e5ff;background:rgba(0,229,255,0.15)"></div>Action / Input</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#f59e0b;background:rgba(245,158,11,0.1)"></div>Decision</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#7c3aed;background:rgba(124,58,237,0.1)"></div>API / Service</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#10b981;background:rgba(16,185,129,0.1)"></div>Storage</div>
  </div>
  <div class="diagram-wrap">
    <svg class="flow" viewBox="0 0 960 1120" height="1120">
      <!-- START -->
      <ellipse cx="480" cy="40" rx="90" ry="24" class="node-start glow-cyan"/>
      <text x="480" y="44" text-anchor="middle" class="node-text-light">START REGISTER</text>

      <!-- Enter details -->
      <line x1="480" y1="64" x2="480" y2="96" class="edge" marker-end="url(#arr)"/>
      <rect x="300" y="96" width="360" height="64" rx="6" class="node-action"/>
      <text x="480" y="118" text-anchor="middle" class="node-text">Enter Registration Details</text>
      <text x="480" y="134" text-anchor="middle" class="node-label">NAME  •  PHONE NUMBER  •  OPTIONAL EMAIL</text>
      <text x="480" y="150" text-anchor="middle" class="node-label">COUNTRY CODE PICKER</text>

      <!-- Validate inputs -->
      <line x1="480" y1="160" x2="480" y2="192" class="edge" marker-end="url(#arr)"/>
      <polygon points="480,192 620,228 480,264 340,228" class="node-decision"/>
      <text x="480" y="224" text-anchor="middle" class="node-text">Inputs Valid?</text>
      <text x="480" y="240" text-anchor="middle" class="node-label">FORMAT + REQUIRED FIELDS</text>

      <!-- Invalid -->
      <line x1="620" y1="228" x2="740" y2="228" class="edge-no" marker-end="url(#arr-no)"/>
      <text x="671" y="222" text-anchor="middle" class="edge-label-no">NO</text>
      <rect x="740" y="206" width="160" height="44" rx="6" style="fill:#13131f;stroke:#ef4444;stroke-width:1.5"/>
      <text x="820" y="224" text-anchor="middle" class="node-text">Inline Validation</text>
      <text x="820" y="238" text-anchor="middle" class="node-text">Errors</text>
      <path d="M900,228 Q940,228 940,176 Q940,112 660,112" class="edge-no" fill="none" marker-end="url(#arr-no)"/>

      <!-- Check phone exists -->
      <line x1="480" y1="264" x2="480" y2="296" class="edge-yes" marker-end="url(#arr-yes)"/>
      <text x="490" y="284" class="edge-label-yes">YES</text>
      <rect x="300" y="296" width="360" height="48" rx="6" class="node-api"/>
      <text x="480" y="314" text-anchor="middle" class="node-text">Check Phone Availability</text>
      <text x="480" y="330" text-anchor="middle" class="node-label">QUERY USER DB  •  UNIQUENESS CHECK</text>

      <!-- Already registered? -->
      <line x1="480" y1="344" x2="480" y2="376" class="edge" marker-end="url(#arr)"/>
      <polygon points="480,376 640,412 480,448 320,412" class="node-decision"/>
      <text x="480" y="408" text-anchor="middle" class="node-text">Already Registered?</text>
      <text x="480" y="424" text-anchor="middle" class="node-label">PHONE IN DB?</text>

      <!-- Already exists -->
      <line x1="640" y1="412" x2="760" y2="412" class="edge-no" marker-end="url(#arr-no)"/>
      <text x="692" y="406" text-anchor="middle" class="edge-label-no">YES</text>
      <rect x="760" y="390" width="160" height="44" rx="6" style="fill:#13131f;stroke:#ef4444;stroke-width:1.5"/>
      <text x="840" y="407" text-anchor="middle" class="node-text">Show "Phone</text>
      <text x="840" y="421" text-anchor="middle" class="node-text">Already Exists"</text>

      <!-- Not exists → Send OTP -->
      <line x1="480" y1="448" x2="480" y2="480" class="edge-yes" marker-end="url(#arr-yes)"/>
      <text x="490" y="468" class="edge-label-yes">NO</text>
      <rect x="300" y="480" width="360" height="48" rx="6" class="node-api"/>
      <text x="480" y="498" text-anchor="middle" class="node-text">Send Verification OTP</text>
      <text x="480" y="514" text-anchor="middle" class="node-label">SMS GATEWAY  •  STORE HASHED OTP</text>

      <!-- Enter OTP -->
      <line x1="480" y1="528" x2="480" y2="560" class="edge" marker-end="url(#arr)"/>
      <rect x="340" y="560" width="280" height="48" rx="6" class="node-action"/>
      <text x="480" y="578" text-anchor="middle" class="node-text">Enter OTP Code</text>
      <text x="480" y="594" text-anchor="middle" class="node-label">6-DIGIT  •  3 MIN WINDOW</text>

      <!-- Verify OTP -->
      <line x1="480" y1="608" x2="480" y2="640" class="edge" marker-end="url(#arr)"/>
      <polygon points="480,640 620,676 480,712 340,676" class="node-decision"/>
      <text x="480" y="672" text-anchor="middle" class="node-text">OTP Valid?</text>
      <text x="480" y="688" text-anchor="middle" class="node-label">HASH COMPARE + EXPIRY</text>

      <!-- OTP invalid retry -->
      <line x1="340" y1="676" x2="200" y2="676" class="edge-no" marker-end="url(#arr-no)"/>
      <text x="263" y="670" text-anchor="middle" class="edge-label-no">NO</text>
      <rect x="60" y="654" width="140" height="44" rx="6" style="fill:#13131f;stroke:#ef4444;stroke-width:1.5"/>
      <text x="130" y="672" text-anchor="middle" class="node-text">Resend Option</text>
      <text x="130" y="686" text-anchor="middle" class="node-text">After 30s</text>
      <path d="M60,676 Q30,676 30,608 Q30,560 340,560" class="edge-no" fill="none" marker-end="url(#arr-no)"/>

      <!-- Valid → Create user -->
      <line x1="480" y1="712" x2="480" y2="744" class="edge-yes" marker-end="url(#arr-yes)"/>
      <text x="490" y="732" class="edge-label-yes">YES</text>
      <rect x="300" y="744" width="360" height="48" rx="6" class="node-storage"/>
      <text x="480" y="762" text-anchor="middle" class="node-text">Create User Record</text>
      <text x="480" y="778" text-anchor="middle" class="node-label">INSERT DB  •  MARK PHONE VERIFIED</text>

      <!-- Send welcome -->
      <line x1="480" y1="792" x2="480" y2="824" class="edge" marker-end="url(#arr)"/>
      <rect x="300" y="824" width="360" height="48" rx="6" class="node-api"/>
      <text x="480" y="842" text-anchor="middle" class="node-text">Send Welcome SMS</text>
      <text x="480" y="858" text-anchor="middle" class="node-label">OPTIONAL  •  ONBOARDING FLOW</text>

      <!-- Auto login -->
      <line x1="480" y1="872" x2="480" y2="904" class="edge" marker-end="url(#arr)"/>
      <rect x="300" y="904" width="360" height="48" rx="6" class="node-storage"/>
      <text x="480" y="922" text-anchor="middle" class="node-text">Auto-Login (Create Session)</text>
      <text x="480" y="938" text-anchor="middle" class="node-label">JWT  •  SKIP RE-AUTH AFTER REGISTER</text>

      <!-- Success -->
      <line x1="480" y1="952" x2="480" y2="984" class="edge-yes" marker-end="url(#arr-yes)"/>
      <ellipse cx="480" cy="1008" rx="110" ry="24" style="fill:#10b981" class="glow-green"/>

<script>
  function switchTab(id) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['login','register','otp'][i] === id);
    });
    document.querySelectorAll('.canvas').forEach(c => {
      c.classList.toggle('active', c.id === 'tab-' + id);
    });
  }
</script>
